<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hand Tracking — Phase 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10131A;
    --panel: #171B24;
    --panel-border: #262C3A;
    --text-primary: #ECEFF4;
    --text-secondary: #8891A3;
    --text-dim: #565E70;
    --accent: #4FD8C4;
    --error: #F2735A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-primary);
    padding: 24px;
  }
  .panel {
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 28px 26px 24px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  h1 { font-size: 19px; font-weight: 600; margin: 0 0 20px; }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #0C0F15;
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    overflow: hidden;
  }
  #webcam, #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1); /* mirror for natural selfie-view */
  }
  #webcam { object-fit: cover; }

  .controls { display: flex; gap: 8px; margin-top: 16px; }
  button {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 10px 18px;
  }
  #start-btn { background: var(--accent); color: #06231F; }
  #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #stop-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--panel-border); }

  #status {
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  #status::before { content: ">"; color: var(--text-dim); }
  #status.error { color: var(--error); }
  #status.ok { color: var(--accent); }

  #fingertip-readout {
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    min-height: 16px;
  }

  .footnote {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--panel-border);
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-dim);
  }
</style>
</head>
<body>

  <div class="panel">
    <p class="eyebrow">Checkpoint · Phase 2</p>
    <h1>Hand landmark tracking</h1>

    <div class="video-wrap">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="controls">
      <button id="start-btn">Start camera</button>
      <button id="stop-btn">Stop</button>
    </div>

    <div id="status" class="ok">idle — click "Start camera"</div>
    <div id="fingertip-readout"></div>

    <p class="footnote">
      Goal of this phase: confirm stable, low-latency detection of the
      21 hand landmarks and the index fingertip (landmark 8) position
      in real time. Gesture segmentation (pen up/down) and trajectory
      capture come in Phase 3–4.
    </p>
  </div>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver,
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("webcam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");
const readoutEl = document.getElementById("fingertip-readout");
const startBtn = document.getElementById("start-btn");
const stopBtn = document.getElementById("stop-btn");

// 21-point hand skeleton connections (MediaPipe hand landmark topology)
const HAND_CONNECTIONS = [
  [0, 1], [1, 2], [2, 3], [3, 4],
  [0, 5], [5, 6], [6, 7], [7, 8],
  [5, 9], [9, 10], [10, 11], [11, 12],
  [9, 13], [13, 14], [14, 15], [15, 16],
  [13, 17], [17, 18], [18, 19], [19, 20],
  [0, 17],
];

let handLandmarker = null;
let stream = null;
let running = false;
let lastVideoTime = -1;

function setStatus(text, kind) {
  statusEl.textContent = text;
  statusEl.className = kind;
}

async function createHandLandmarker() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
  });
}

async function startCamera() {
  startBtn.disabled = true;
  try {
    setStatus("requesting camera permission...", "ok");
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480 },
    });
    video.srcObject = stream;
    await video.play();

    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;

    if (!handLandmarker) {
      setStatus("camera active — loading hand-tracking model...", "ok");
      await createHandLandmarker();
    }

    setStatus("tracking...", "ok");
    running = true;
    requestAnimationFrame(predictLoop);
  } catch (err) {
    setStatus("camera/model error: " + err.message, "error");
    console.error(err);
    startBtn.disabled = false;
  }
}

function stopCamera() {
  running = false;
  if (stream) {
    stream.getTracks().forEach((t) => t.stop());
    stream = null;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  readoutEl.textContent = "";
  setStatus("stopped", "ok");
  startBtn.disabled = false;
}

function predictLoop() {
  if (!running) return;
  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const result = handLandmarker.detectForVideo(video, performance.now());
    drawResults(result);
  }
  requestAnimationFrame(predictLoop);
}

function drawResults(result) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!result.landmarks || result.landmarks.length === 0) {
    readoutEl.textContent = "No hand detected";
    return;
  }

  const landmarks = result.landmarks[0];

  // skeleton
  ctx.strokeStyle = "rgba(79, 216, 196, 0.6)";
  ctx.lineWidth = 2;
  for (const [a, b] of HAND_CONNECTIONS) {
    const p1 = landmarks[a];
    const p2 = landmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
    ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
    ctx.stroke();
  }

  // all 21 joints
  ctx.fillStyle = "#4FD8C4";
  for (const pt of landmarks) {
    ctx.beginPath();
    ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 3.5, 0, 2 * Math.PI);
    ctx.fill();
  }

  // highlight index fingertip (landmark 8) — this is the "pen" we'll
  // track for air-writing in later phases
  const tip = landmarks[8];
  ctx.fillStyle = "#F2735A";
  ctx.beginPath();
  ctx.arc(tip.x * canvas.width, tip.y * canvas.height, 7, 0, 2 * Math.PI);
  ctx.fill();

  readoutEl.textContent =
    `index fingertip -> x: ${tip.x.toFixed(3)}  y: ${tip.y.toFixed(3)}  z: ${tip.z.toFixed(3)}`;
}

startBtn.addEventListener("click", startCamera);
stopBtn.addEventListener("click", stopCamera);
</script>
</body>
</html>
