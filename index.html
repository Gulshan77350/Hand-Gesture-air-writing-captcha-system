<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air-Writing Captcha — Phase 1</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 420px;
    margin: 60px auto;
    text-align: center;
    color: #222;
  }
  #captcha-img {
    border: 1px solid #ccc;
    border-radius: 6px;
    margin: 16px 0;
  }
  button {
    padding: 10px 18px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 4px;
  }
  #refresh-btn { background: #eee; }
  #enter-btn { background: #2563eb; color: white; }
  #enter-btn:disabled { background: #93a5c9; cursor: not-allowed; }
  #status { margin-top: 14px; font-size: 14px; min-height: 20px; }
  .success { color: #16a34a; }
  .error { color: #dc2626; }
  input#manual-input {
    padding: 8px;
    font-size: 15px;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 140px;
  }
  #camera-note {
    font-size: 12px;
    color: #888;
    margin-top: 24px;
  }
</style>
</head>
<body>

  <h2>Verify you're human</h2>

  <img id="captcha-img" alt="captcha" width="300" height="110" />
  <div>
    <button id="refresh-btn">↻ New captcha</button>
  </div>

  <!--
    Phase 1 placeholder input. In Phase 3/4 this text field is replaced
    by the camera view + air-writing trace overlay, and the "Enter
    CAPTCHA" button opens the camera instead of submitting typed text.
  -->
  <div style="margin-top: 18px;">
    <input id="manual-input" placeholder="Type captcha" maxlength="8" />
    <br/>
    <button id="enter-btn">Enter CAPTCHA</button>
  </div>

  <div id="status"></div>

  <p id="camera-note">
    Note: this Phase 1 build uses a typed-text placeholder for verification.
    The camera / air-writing input replaces this in Phase 2–4.
  </p>

<script>
const API_BASE = "http://localhost:8000";

let currentSessionId = null;

async function loadCaptcha() {
  document.getElementById("status").textContent = "";
  document.getElementById("status").className = "";
  document.getElementById("manual-input").value = "";

  const res = await fetch(`${API_BASE}/api/captcha`);
  const data = await res.json();

  currentSessionId = data.session_id;
  document.getElementById("captcha-img").src =
    `data:image/png;base64,${data.image_base64}`;
}

async function submitCaptcha() {
  const text = document.getElementById("manual-input").value.trim();
  const statusEl = document.getElementById("status");

  if (!text) {
    statusEl.textContent = "Please enter the captcha text.";
    statusEl.className = "error";
    return;
  }
  if (!currentSessionId) {
    statusEl.textContent = "No active captcha session — refresh and try again.";
    statusEl.className = "error";
    return;
  }

  const res = await fetch(`${API_BASE}/api/verify`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ session_id: currentSessionId, text }),
  });

  if (res.status === 429 || res.status === 400) {
    const err = await res.json();
    statusEl.textContent = err.detail || "Session expired — refresh.";
    statusEl.className = "error";
    await loadCaptcha();
    return;
  }

  const data = await res.json();
  if (data.success) {
    statusEl.textContent = "✓ Verified!";
    statusEl.className = "success";
  } else {
    statusEl.textContent = `Incorrect. Attempts remaining: ${data.attempts_remaining}`;
    statusEl.className = "error";
  }
}

document.getElementById("refresh-btn").addEventListener("click", loadCaptcha);
document.getElementById("enter-btn").addEventListener("click", submitCaptcha);

loadCaptcha();
</script>
</body>
</html>
